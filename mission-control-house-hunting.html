<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>House Hunting · Mission Control</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{
      --bg:#030308;
      --panel:#101223;
      --card:#1d2135;
      --card-alt:#252a42;
      --muted:#a0a8c5;
      --border:rgba(255,255,255,.12);
      --accent:#ff6fb0;
      --accent2:#10a37f;
      --accent3:#ffb347;
      font-family:'Space Grotesk','Inter',system-ui;
    }
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#1a0f2e,#030308 45%);color:#f5f7ff;padding:10px;}
    .page{width:min(1600px,100%);margin:0 auto;background:var(--panel);border-radius:24px;padding:16px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.6);}
    .top-link{display:inline-flex;align-items:center;gap:8px;margin:0 0 12px;color:#cdd8ff;text-decoration:none;font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.03);}
    .top-link:hover{background:rgba(255,255,255,.08);}
    .main{overflow:hidden;}
    .glass-header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;padding:14px 18px;border-radius:22px;border:1px solid rgba(255,255,255,.14);background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.04));box-shadow:0 20px 50px rgba(0,0,0,.45);backdrop-filter:blur(14px);margin-bottom:20px;}
    h1{margin:0;font-size:1.5rem;letter-spacing:.22em;text-transform:uppercase;}
    .subtitle{color:var(--muted);max-width:600px;line-height:1.5;letter-spacing:.06em;margin-top:8px;font-size:.9rem;}
    .chipbar{display:flex;gap:10px;flex-wrap:wrap;}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(12,14,24,.28);color:#fff;text-decoration:none;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:.15s;}
    .chip:hover{transform:translateY(-1px);background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.26);}
    .chip.active{background:rgba(255,111,176,.14);border-color:rgba(255,111,176,.50);color:#ffd9e8;}

    .map-container{border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.12);margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,.4);}
    #map{height:clamp(420px,58vh,760px);width:100%;background:var(--card-alt);}
    .custom-marker{background:var(--accent);border:3px solid #fff;border-radius:50%;width:24px;height:24px;box-shadow:0 4px 12px rgba(255,111,176,.5);cursor:pointer;transition:.2s;}
    .custom-marker:hover{transform:scale(1.2);}
    .custom-marker.shortlist{background:var(--accent3);box-shadow:0 4px 12px rgba(255,179,71,.5);}
    .custom-marker.viewed{background:var(--accent2);box-shadow:0 4px 12px rgba(16,163,127,.5);}
    .custom-marker.priority{background:#ffd700;box-shadow:0 4px 20px rgba(255,215,0,.9);width:32px;height:32px;border-width:4px;border-color:#ff8c00;animation:pulse 2s infinite;}
    .custom-marker.locked-star{width:34px;height:34px;background:radial-gradient(circle at 35% 30%,#ffe27a 0%,#d4a514 55%,#8a6b00 100%);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);border:2px solid #111;box-shadow:0 0 0 2px rgba(255,215,0,.45),0 8px 18px rgba(0,0,0,.55);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

    .leaflet-popup-content-wrapper{background:#141a2a;color:#f5f7ff;border:1px solid rgba(255,255,255,.16);border-radius:14px;}
    .leaflet-popup-tip{background:#141a2a;}
    .map-popup{width:min(300px,70vw);}
    .map-popup h4{margin:0 0 6px;font-size:.95rem;}
    .map-popup .meta{font-size:.75rem;color:var(--muted);margin-bottom:8px;line-height:1.4;}
    .map-popup .price{display:inline-block;font-size:.72rem;padding:4px 10px;border-radius:999px;background:rgba(167,139,250,.2);border:1px solid rgba(167,139,250,.4);margin-bottom:8px;}
    .map-popup .gallery{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
    .map-popup .gallery img{width:100%;height:80px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,.15);}
    .map-popup .note{font-size:.72rem;color:#cfd6f8;line-height:1.35;}

    .station-marker{width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#63e6ff,#22c1ff);border:2px solid #e6fbff;box-shadow:0 0 0 3px rgba(34,193,255,.25),0 4px 10px rgba(0,0,0,.35);}
    .station-marker.mrt{background:linear-gradient(135deg,#9b8cff,#7b6dff);box-shadow:0 0 0 3px rgba(123,109,255,.25),0 4px 10px rgba(0,0,0,.35);}
    .job-marker{width:18px;height:18px;transform:rotate(45deg);background:linear-gradient(135deg,#ff9f43,#ff6f91);border:2px solid #ffe0c2;box-shadow:0 0 0 3px rgba(255,111,145,.28),0 4px 12px rgba(0,0,0,.4);border-radius:4px;}
    .job-marker.trent{background:linear-gradient(135deg,#4cc9f0,#4895ef);border-color:#dff2ff;box-shadow:0 0 0 3px rgba(72,149,239,.28),0 4px 12px rgba(0,0,0,.4);}
    .sauna-marker{font-size:18px;line-height:18px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.45));}
    .map-legend{position:absolute;z-index:500;right:12px;bottom:12px;background:rgba(10,14,24,.85);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:8px 10px;backdrop-filter:blur(8px);font-size:.68rem;letter-spacing:.06em;color:#dce4ff;display:flex;gap:12px;align-items:center;}
    .map-legend .item{display:flex;align-items:center;gap:6px;}
    .map-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
    .map-legend .dot.bts{background:#22c1ff;box-shadow:0 0 0 2px rgba(34,193,255,.25);}
    .map-legend .dot.mrt{background:#7b6dff;box-shadow:0 0 0 2px rgba(123,109,255,.25);}
    .map-legend .dot.job{background:#ff7b8f;box-shadow:0 0 0 2px rgba(255,123,143,.28);}
    .map-legend .dot.trent{background:#4895ef;box-shadow:0 0 0 2px rgba(72,149,239,.28);}
    .map-legend .dot.sauna{background:#ff9f43;box-shadow:0 0 0 2px rgba(255,159,67,.3);}

    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
    .stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:16px;padding:16px;text-align:center;transition:.2s;}
    .stat-card:hover{background:rgba(255,255,255,.06);transform:translateY(-2px);}
    .stat-card h3{margin:0;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}
    .stat-card strong{display:block;margin-top:8px;font-size:1.6rem;letter-spacing:.08em;color:var(--accent);}
    .stat-card:nth-child(2) strong{color:var(--accent3);}
    .stat-card:nth-child(3) strong{color:var(--accent2);}
    .stat-card:nth-child(4) strong{color:#a78bfa;}

    .section-title{font-size:1rem;letter-spacing:.2em;text-transform:uppercase;margin:24px 0 16px;display:flex;justify-content:space-between;align-items:center;}
    .condo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:20px;}
    .condo-card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.12);border-radius:20px;overflow:hidden;transition:all .25s ease;box-shadow:0 8px 30px rgba(0,0,0,.3);}
    .condo-card:hover{transform:translateY(-4px);border-color:rgba(255,111,176,.3);box-shadow:0 12px 40px rgba(0,0,0,.4);}
    .condo-card.shortlist{border-color:rgba(255,179,71,.4);}
    .condo-header{position:relative;height:180px;background:linear-gradient(135deg,#1a103c,#0d0820);overflow:hidden;}
    .condo-header img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
    .condo-card:hover .condo-header img{transform:scale(1.05);}
    .condo-header::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 60%);}
    .condo-badges{position:absolute;bottom:12px;left:12px;right:12px;z-index:2;display:flex;gap:8px;flex-wrap:wrap;}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.6);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;backdrop-filter:blur(4px);}
    .badge.shortlist{border-color:rgba(255,179,71,.6);color:#ffdfb0;background:rgba(255,179,71,.2);}
    .badge.viewed{border-color:rgba(16,163,127,.5);color:#9ff1db;background:rgba(16,163,127,.15);}
    .badge.price{border-color:rgba(167,139,250,.5);color:#ddd6fe;background:rgba(167,139,250,.15);font-weight:600;}
    .badge.priority{border-color:rgba(255,111,176,.8);color:#fff;background:rgba(255,111,176,.4);font-weight:600;}
    .condo-card.priority{border-color:rgba(255,111,176,.5);box-shadow:0 8px 30px rgba(255,111,176,.2);}
    .condo-card.priority:hover{border-color:rgba(255,111,176,.7);box-shadow:0 12px 40px rgba(255,111,176,.3);}
    .condo-card.deprioritized{opacity:.5;filter:grayscale(.6);}
    .condo-card.deprioritized:hover{opacity:.7;filter:grayscale(.3);}
    .condo-actions{position:absolute;top:12px;right:12px;z-index:2;display:flex;gap:8px;}
    .action-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;font-size:1rem;}
    .action-btn:hover{background:rgba(255,111,176,.3);border-color:var(--accent);transform:scale(1.1);}
    .action-btn.active{background:var(--accent);border-color:var(--accent);}
    .condo-body{padding:18px;}
    .condo-title{font-size:1.1rem;font-weight:600;margin:0 0 8px;letter-spacing:.02em;}
    .condo-location{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted);margin-bottom:12px;}
    .condo-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;padding:12px;background:rgba(255,255,255,.04);border-radius:12px;}
    .meta-item{text-align:center;}
    .meta-item strong{display:block;font-size:1.1rem;color:var(--accent3);}
    .meta-item span{font-size:.65rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
    .condo-details{font-size:.85rem;color:var(--muted);line-height:1.5;margin-bottom:16px;}
    .room-list{display:flex;flex-direction:column;gap:8px;}
    .room-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.08);transition:.2s;cursor:pointer;}
    .room-item:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);}
    .room-info{display:flex;flex-direction:column;gap:2px;}
    .room-name{font-size:.85rem;font-weight:500;}
    .room-specs{font-size:.7rem;color:var(--muted);}
    .room-price{font-size:.9rem;font-weight:600;color:var(--accent3);}
    .room-status{font-size:.65rem;padding:3px 8px;border-radius:999px;}
    .room-status.available{background:rgba(16,163,127,.2);color:#9ff1db;}
    .room-status.pending{background:rgba(255,179,71,.2);color:#ffdfb0;}
    .notes-box{margin-top:12px;padding:12px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.08);}
    .notes-box h4{margin:0 0 8px;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);}
    .notes-box textarea{width:100%;background:transparent;border:none;color:#fff;font-family:inherit;font-size:.8rem;resize:vertical;min-height:60px;outline:none;}

    @media (max-width: 900px){
      body{padding:0;}
      .page{border-radius:0;min-height:100vh;padding:12px;}
      .glass-header{padding:12px 12px 14px;}
      h1{font-size:1.25rem;letter-spacing:.18em;}
      .subtitle{font-size:.85rem;}
      #map{height:65vh;min-height:420px;}
      .stats-bar{grid-template-columns:repeat(2,1fr);}
      .condo-grid{grid-template-columns:1fr;}
    }
  </style>
</head>

          <span class="item"><span class="dot mrt"></span>MRT</span>

        <div class="stat-card">

      </div>

      <div class="condo-grid" id="condo-grid"></div>
    </div>
  </div>

        notes: "❌ NO SAUNA - Dealbreaker for Trent. 70sqm 2BR good for Nasha storage needs though."
      },
      {
        id: 7,
        name: "Saladaeng Residences",
        location: "Silom/Sala Daeng",
        coords: [13.7252, 100.5383],
        price: "฿40,000",
        size: "61 sqm",
        distance: "Sala Daeng BTS / MRT Silom",
        status: "new",
        image: "https://images.unsplash.com/photo-1600573472550-8090b5e0745e?auto=format&fit=crop&w=800&q=80",
        details: "Infinity pool (16F), sky lounge (25F), rooftop garden, gym, 24hr security. Built 2010 by PACE.",
        rooms: [
          {name: "Corner Unit", specs: "61 sqm, 1BR/1BA, 8/25F", price: "฿40,000", status: "available"}
        ],
        notes: "Over budget. Try negotiate to ฿35-37k. Contact: Khun Rath 064-990-9586 / Line: 0649909586"
      },
      {
        id: 10,
        name: "Cooper Siam",
        location: "Siam / Pathum Wan",
        coords: [13.7451, 100.5224],
        price: "TBD",
        size: "~36 sqm",
        distance: "~15 min walk to station (shuttle bus available)",
        status: "viewed",
        image: "assets/condos/cooper-visit-1.jpg",
        gallery: [
          "assets/condos/cooper-visit-1.jpg",
          "https://images.unsplash.com/photo-1600585154526-990dced4db0d?auto=format&fit=crop&w=800&q=80"
        ],
        details: "Viewed in person. Basic-layout rooms used space well despite compact size. Convenient for Nasha's new work and close to a major food street.",
        rooms: [
          {name: "Best layout", specs: "~36 sqm, basic layout", price: "TBD", status: "viewed"},
          {name: "Other viewed rooms", specs: "4 rooms toured total", price: "TBD", status: "viewed"}
        ],
        notes: "Visited yesterday. Pros: efficient layout, near Nasha's work, near food street. Cons: no sauna, ~15 min walk to station (shuttle helps), common areas felt hot/no AC. Overall: not thrilled; keep as backup."
      },
      {
        id: 11,
        name: "Ideo Sam Yan",
        location: "Sam Yan / Si Phraya",
        coords: [13.7315, 100.5256],
        price: "฿30,000 (discounted)",
        size: "~70 sqm",
        distance: "~300-450m to Sam Yan MRT (about 4-6 min walk)",
        status: "priority",
        image: "https://images.unsplash.com/photo-1600607687644-c7171b42498f?auto=format&fit=crop&w=800&q=80",
        gallery: [
          "https://images.unsplash.com/photo-1600607687644-c7171b42498f?auto=format&fit=crop&w=800&q=80",
          "https://images.unsplash.com/photo-1600607688960-e095ff83135f?auto=format&fit=crop&w=800&q=80"
        ],
        details: "✅ Decided and deposit paid. Top floor zone (27F, one below pool). Move-in planned end of April. Public area sauna confirmed working.",
        rooms: [
          {name: "Chosen unit", specs: "~70 sqm, 27F", price: "฿30,000/mo", status: "available"}
        ],
        notes: "DECIDED PLACE. Upfront move-in target: ฿90,000 (3 x ฿30,000). Deposit already partially paid (half-month accepted). Agent mentioned extra savings possible by renting out car + motorbike spaces (~฿3,500/mo). Included: free Wi-Fi, furniture, 49\" TV. Not included: washing machine (agent offering ฿6,000 fee credit). Contract not signed yet; confirm 12-month term + who holds deposit + refund timeline in writing before final payment."
      }
    ];

    const jobs = [
      {
        name: "Design Hotel Siam @Siam",
        location: "Siam@Siam Design Hotel Bangkok, 865 Rama I Rd",
        coords: [13.7472289, 100.5269059],
        note: "In progress: 2nd round interview",
        type: "nasha"
      },
      {
        name: "EduFirst School (CentralWorld)",
        location: "CentralWorld Tower, Rama I Rd",
        coords: [13.7452312, 100.5389856],
        note: "Trent part-time work location",
        type: "trent"
      }
    ];

    const saunaSpots = [
      {
        name: "Yunomori Onsen & Spa Sathorn 10",
        location: "Soi Sathorn 10",
        coords: [13.7222568, 100.5274151],
        note: "Onsen + sauna"
      }
    ];

    const stations = [
      { name: "Wongwian Yai BTS", line: "BTS", coords: [13.7214, 100.4954] },
      { name: "Pho Nimit BTS", line: "BTS", coords: [13.7191, 100.4862] },
      { name: "Talat Phlu BTS", line: "BTS", coords: [13.7142, 100.4767] },
      { name: "Wutthakat BTS", line: "BTS", coords: [13.7130, 100.4689] },
      { name: "Bang Wa BTS", line: "BTS", coords: [13.7203, 100.4570] },

      { name: "Krung Thonburi BTS", line: "BTS", coords: [13.7207, 100.5020] },
      { name: "Saphan Taksin BTS", line: "BTS", coords: [13.7188, 100.5142] },
      { name: "Surasak BTS", line: "BTS", coords: [13.7193, 100.5215] },
      { name: "Saint Louis BTS", line: "BTS", coords: [13.7208, 100.5267] },
      { name: "Chong Nonsi BTS", line: "BTS", coords: [13.7238, 100.5293] },
      { name: "Sala Daeng BTS", line: "BTS", coords: [13.7286, 100.5343] },
      { name: "Ratchadamri BTS", line: "BTS", coords: [13.7395, 100.5395] },
      { name: "Siam BTS", line: "BTS", coords: [13.7456, 100.5342] },
      { name: "National Stadium BTS", line: "BTS", coords: [13.7465, 100.5291] },

      { name: "Silom MRT", line: "MRT", coords: [13.7293, 100.5368] },
      { name: "Lumphini MRT", line: "MRT", coords: [13.7256, 100.5457] },
      { name: "Khlong Toei MRT", line: "MRT", coords: [13.7221, 100.5544] },
      { name: "Queen Sirikit MRT", line: "MRT", coords: [13.7227, 100.5599] },
      { name: "Sukhumvit MRT (Asok)", line: "MRT", coords: [13.7374, 100.5613] },

      { name: "Sam Yan MRT", line: "MRT", coords: [13.7321, 100.5301] },
      { name: "Hua Lamphong MRT", line: "MRT", coords: [13.7376, 100.5171] },
      { name: "Wat Mangkon MRT", line: "MRT", coords: [13.7422, 100.5099] },
      { name: "Sam Yot MRT", line: "MRT", coords: [13.7470, 100.5023] },
      { name: "Sanam Chai MRT", line: "MRT", coords: [13.7443, 100.4946] },
      { name: "Itsaraphap MRT", line: "MRT", coords: [13.7384, 100.4857] }
    ];

    // Status normalization: only Cooper is recently viewed; Ideo Sam Yan pending; keep known priorities
    condos.forEach(condo => {
      if (condo.id === 10) condo.status = 'viewed';
      else if (condo.id === 11) condo.status = 'new';
      else if ([6, 3, 8].includes(condo.id)) condo.status = 'priority';
      else condo.status = 'new';
    });

    let map;
    let markers = [];
    let stationMarkers = [];
    let jobMarkers = [];
    let saunaMarkers = [];
    let currentFilter = 'all';

    function initMap() {
      // Center on Sathorn/Wongwian Yai area where all condos are located
      map = L.map('map', {
        center: [13.723, 100.515],
        zoom: 15,
        minZoom: 14,
        maxBounds: [[13.70, 100.47], [13.75, 100.56]]
      });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);

      addMarkers();
      addStationMarkers();
      addJobMarkers();
      addSaunaMarkers();
    }

    function addStationMarkers() {
      stationMarkers.forEach(m => map.removeLayer(m));
      stationMarkers = [];

      stations.forEach(station => {
        const icon = L.divIcon({
          html: `<div class="station-marker ${station.line === 'MRT' ? 'mrt' : ''}"></div>`,
          className: '',
          iconSize: [16, 16],
          iconAnchor: [8, 8]
        });

        const marker = L.marker(station.coords, { icon, interactive: true })
          .bindTooltip(`<b>${station.name}</b><br>${station.line} Station`, {
            direction: 'top',
            offset: [0, -10],
            opacity: 0.95,
            sticky: true
          })
          .addTo(map);

        stationMarkers.push(marker);
      });
    }

    function addJobMarkers() {
      jobMarkers.forEach(m => map.removeLayer(m));
      jobMarkers = [];

      jobs.forEach(job => {
        const icon = L.divIcon({
          html: `<div class="job-marker ${job.type === 'trent' ? 'trent' : ''}"></div>`,
          className: '',
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        });

        const marker = L.marker(job.coords, { icon, interactive: true })
          .bindPopup(`<b>${job.name}</b><br>${job.location}<br><i>${job.note}</i>`, { maxWidth: 300 })
          .bindTooltip(`<b>${job.name}</b><br>${job.note}`, {
            direction: 'top',
            offset: [0, -10],
            opacity: 0.95,
            sticky: true
          })
          .addTo(map);

        jobMarkers.push(marker);
      });
    }

    function addSaunaMarkers() {
      saunaMarkers.forEach(m => map.removeLayer(m));
      saunaMarkers = [];

      saunaSpots.forEach(spot => {
        const icon = L.divIcon({
          html: `<div class="sauna-marker">♨️</div>`,
          className: '',
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        });

        const marker = L.marker(spot.coords, { icon, interactive: true })
          .bindPopup(`<b>${spot.name}</b><br>${spot.location}<br><i>${spot.note}</i>`, { maxWidth: 280 })
          .bindTooltip(`<b>${spot.name}</b><br>${spot.note}`, {
            direction: 'top',
            offset: [0, -10],
            opacity: 0.95,
            sticky: true
          })
          .addTo(map);

        saunaMarkers.push(marker);
      });
    }

    function getPopupHtml(condo) {
      const gallery = (condo.gallery && condo.gallery.length ? condo.gallery : [condo.image]).slice(0, 2);
      const galleryHtml = gallery.map(src => `<img src="${src}" alt="${condo.name}" loading="lazy">`).join('');
      return `
        <div class="map-popup">
          <h4>${condo.name}</h4>
          <div class="meta">📍 ${condo.location}<br>${condo.distance}</div>
          <div class="price">${condo.price}</div>
          <div class="gallery">${galleryHtml}</div>
          <div class="note">${condo.status === 'priority' ? '★ Nasha priority · ' : ''}${condo.details}</div>
        </div>
      `;
    }

    function addMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      condos.forEach(condo => {
        if (currentFilter !== 'all' && condo.status !== currentFilter) return;

        let markerClass = '';
        if (condo.status === 'priority') markerClass = 'priority';
        else if (condo.status === 'shortlist') markerClass = 'shortlist';
        else if (condo.status === 'viewed') markerClass = 'viewed';

        const markerHtml = condo.id === 11
          ? `<div class="custom-marker locked-star" title="Locked in"></div>`
          : `<div class="custom-marker ${markerClass}"></div>`;
        const icon = L.divIcon({
          html: markerHtml,
          className: '',
          iconSize: [24, 24],
          iconAnchor: [12, 12]
        });

        const marker = L.marker(condo.coords, {icon})
          .bindPopup(getPopupHtml(condo), { maxWidth: 320 })
          .bindTooltip(`<b>${condo.name}</b>${condo.price ? `<br>${condo.price}` : ''}`, {
            direction: 'top',
            offset: [0, -14],
            opacity: 0.95,
            sticky: true
          })
          .addTo(map);

        marker.on('mouseover', () => marker.openTooltip());
        marker.on('mouseout', () => marker.closeTooltip());
        markers.push(marker);
      });
    }

    function renderCondos() {
      const grid = document.getElementById('condo-grid');
      grid.innerHTML = '';

      let totalUnits = 0;
      let shortlistCount = 0;
      let viewedCount = 0;
      let priorityCount = 0;

      // Sort: Ideo Sam Yan first (target today), then recently viewed, then others
      const sortedCondos = [...condos].sort((a, b) => {
        if (a.id === 11) return -1;
        if (b.id === 11) return 1;
        if (a.status === 'viewed' && b.status !== 'viewed') return -1;
        if (b.status === 'viewed' && a.status !== 'viewed') return 1;
        return 0;
      });

      sortedCondos.forEach(condo => {
        totalUnits += condo.rooms.length;
        if (condo.status === 'shortlist') shortlistCount++;
        if (condo.status === 'viewed') viewedCount++;
        if (condo.status === 'priority') priorityCount++;

        if (currentFilter !== 'all' && condo.status !== currentFilter) return;

        const card = document.createElement('div');
        const isPriority = condo.status === 'priority';
        const isDeprioritized = !isPriority;
        card.className = `condo-card ${condo.status} ${isDeprioritized ? 'deprioritized' : ''}`;
        card.id = `condo-${condo.id}`;

        const roomsHtml = condo.rooms.map(room => `
          <div class="room-item">
            <div class="room-info">
              <span class="room-name">${room.name}</span>
              <span class="room-specs">${room.specs}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="room-price">${room.price}</span>
              <span class="room-status ${room.status}">${room.status}</span>
            </div>
          </div>
        `).join('');

        let badgeClass, badgeText;
        if (condo.status === 'priority') {
          badgeClass = 'priority';
          badgeText = '★ NASHA PRIORITY';
        } else if (condo.status === 'shortlist') {
          badgeClass = 'shortlist';
          badgeText = '★ Shortlist';
        } else if (condo.status === 'viewed') {
          badgeClass = 'viewed';
          badgeText = '✓ Recently Viewed';
        } else {
          badgeClass = 'new';
          badgeText = '● Other';
        }

        card.innerHTML = `
          <div class="condo-header">
            <img src="${condo.image}" alt="${condo.name}" loading="lazy">
            <div class="condo-badges">
              <span class="badge ${badgeClass}">${badgeText}</span>
              <span class="badge price">${condo.price}</span>
            </div>
            <div class="condo-actions">
              <button class="action-btn ${condo.status === 'shortlist' ? 'active' : ''}" onclick="toggleShortlist(${condo.id})" title="Toggle shortlist">★</button>
              <button class="action-btn ${condo.status === 'viewed' ? 'active' : ''}" onclick="toggleViewed(${condo.id})" title="Mark as recently viewed">✓</button>
            </div>
          </div>
          <div class="condo-body">
            <h3 class="condo-title">${condo.name}</h3>
            <div class="condo-location">📍 ${condo.location} · ${condo.distance}</div>
            <div class="condo-meta">
              <div class="meta-item">
                <strong>${condo.size}</strong>
                <span>Size Range</span>
              </div>
              <div class="meta-item">
                <strong>${condo.rooms.length}</strong>
                <span>Units</span>
              </div>
              <div class="meta-item">
                <strong>${condo.coords[0].toFixed(3)}</strong>
                <span>Latitude</span>
              </div>
            </div>
            <div class="condo-details">${condo.details}</div>
            <div class="room-list">${roomsHtml}</div>
            <div class="notes-box">
              <h4>Notes</h4>
              <textarea placeholder="Add your notes here..." onchange="saveNotes(${condo.id}, this.value)">${condo.notes || ''}</textarea>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });

      document.getElementById('stat-total').textContent = condos.length;
      document.getElementById('stat-shortlist').textContent = shortlistCount;
      document.getElementById('stat-viewed').textContent = viewedCount;
      document.getElementById('stat-units').textContent = totalUnits;
    }

    function filterCondos(filter) {
      currentFilter = filter;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('filter-label').textContent = filter === 'all' ? 'Showing all' : filter === 'priority' ? '★ Showing Nasha Priorities' : filter === 'viewed' ? 'Showing recently viewed' : `Showing ${filter}`;
      renderCondos();
      addMarkers();
    }

    function toggleShortlist(id) {
      const condo = condos.find(c => c.id === id);
      if (condo) {
        condo.status = condo.status === 'shortlist' ? 'new' : 'shortlist';
        renderCondos();
        addMarkers();
      }
    }

    function toggleViewed(id) {
      const condo = condos.find(c => c.id === id);
      if (condo) {
        condo.status = condo.status === 'viewed' ? 'new' : 'viewed';
        renderCondos();
        addMarkers();
      }
    }

    function saveNotes(id, notes) {
      const condo = condos.find(c => c.id === id);
      if (condo) condo.notes = notes;
    }

    document.addEventListener('DOMContentLoaded', () => {
      initMap();
      renderCondos();
    });
  </script>
</body>
</html>
