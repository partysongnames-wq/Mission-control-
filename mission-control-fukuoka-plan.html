<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fukuoka Area Plan · Mission Control</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{--bg:#030308;--panel:#101223;--muted:#a0a8c5;--border:rgba(255,255,255,.14);font-family:'Space Grotesk','Inter',system-ui;}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#233a5f,#030308 45%);color:#f5f7ff;display:flex;justify-content:center;padding:20px}
    .page{width:min(1180px,calc(100vw - 24px));background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:18px}
    .head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .chip{display:inline-flex;padding:7px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.2);color:#fff;text-decoration:none;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase}
    #map{height:460px;border-radius:14px;border:1px solid rgba(255,255,255,.15)}
    .note{margin-top:10px;color:var(--muted);font-size:.86rem}
  </style>
</head>
<body>
  <div class="page">
    <div class="head">
      <div>
        <h2 style="margin:0;letter-spacing:.18em;text-transform:uppercase;">Fukuoka Area (2-night block)</h2>
        <div style="color:var(--muted);margin-top:6px;">Includes Fukuoka + nearby stopovers (Kokura/Shimonoseki) and chain options worth moving from Osaka.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;">
        <a class="chip" href="mission-control.html">⟵ Mission</a>
        <a class="chip" href="mission-control-food.html">🍜 Food</a>
        <a class="chip" href="mission-control-osaka-plan.html">📅 Osaka</a>
        <a class="chip" href="mission-control-trip-map.html">🌐 Master Map</a>
      </div>
    </div>
    <div id="map"></div>
    <div class="note">🟡 Yellow dot = chain candidate you could do here instead of Osaka.</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const map = L.map('map').setView([33.5902,130.4017], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 19, subdomains: 'abcd', attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    const icon = (emoji, chain=false) => L.divIcon({
      className:'',
      html:`<div style="font-size:20px;position:relative;">${emoji}${chain?'<span style="position:absolute;right:-5px;top:-4px;width:8px;height:8px;background:#ffd84d;border:1px solid #222;border-radius:999px"></span>':''}</div>`,
      iconSize:[24,24],iconAnchor:[12,12]
    });

    const centers = {
      'fukuoka': [33.5902,130.4017],
      'kokura': [33.8833,130.8751],
      'shimonoseki': [33.9578,130.9415]
    };

    const staticPoints = [
      {
        name:'Hotel Livemax Kokura Ekimae (your stay base)',
        city:'Kokura',
        emoji:'🏨',
        lat:33.8844,
        lng:130.8829,
        summary:'Confirmed from your booking screenshot: 2-night base in Kokura before Hiroshima.'
      },
      {
        name:'Hakata Station (Shinkansen)',
        city:'Fukuoka',
        emoji:'🚄',
        lat:33.5898,
        lng:130.4207,
        summary:'Main Kyushu Shinkansen / Sanyo Shinkansen hub.'
      },
      {
        name:'Kokura Station (Shinkansen)',
        city:'Kokura',
        emoji:'🚄',
        lat:33.8869,
        lng:130.8826,
        summary:'Major rail hub for Kitakyushu / transfer point.'
      },
      {
        name:'Shin-Shimonoseki Station (Shinkansen)',
        city:'Shimonoseki',
        emoji:'🚄',
        lat:34.0031,
        lng:130.9504,
        summary:'Nearest Shinkansen stop on Shimonoseki side.'
      }
    ];

    // Added from trips/fukuoka-shortlist.md (Yoko shortlist)
    const fukuokaShortlist = [
      {
        name:'Sushi Sakaba Sashisu Honten (Hakata Ming)',
        city:'Fukuoka',
        category:'Sushi izakaya',
        emoji:'🍣',
        photo:'assets/fukuoka-pins/sashisu.jpg',
        mapUrl:'https://www.google.com/maps/search/?api=1&query=%E3%81%99%E3%81%97%E9%85%92%E5%A0%B4+%E3%81%95%E3%81%97%E3%81%99+%E5%8D%9A%E5%A4%9A%E3%83%9E%E3%82%A4%E3%83%B3%E3%82%B0%E5%BA%97'
      },
      {
        name:'I\'m donut ? Fukuoka',
        city:'Fukuoka',
        category:'Donut shop',
        emoji:'🍩',
        photo:'assets/fukuoka-pins/im-donut.jpg',
        mapUrl:'https://www.google.com/maps/search/?api=1&query=I%27m+donut%3F+%E7%A6%8F%E5%B2%A1%E5%BA%97'
      },
      {
        name:'Musashiza (すみ劇場 むさし坐)',
        city:'Fukuoka',
        category:'Izakaya / grilled seafood-meat',
        emoji:'🍽️',
        photo:'assets/fukuoka-pins/musashiza.jpg',
        mapUrl:'https://www.google.com/maps/search/?api=1&query=%E3%81%99%E3%81%BF%E5%8A%87%E5%A0%B4+%E3%82%80%E3%81%95%E3%81%97%E5%9D%90+%E7%A6%8F%E5%B2%A1'
      },
      {
        name:'Shabu Zen Fukuoka Showa-dori Daimyo Branch',
        city:'Fukuoka',
        category:'Shabu-shabu / sukiyaki',
        emoji:'🍲',
        photo:'assets/fukuoka-pins/shabu-zen.jpg',
        mapUrl:'https://www.google.com/maps/search/?api=1&query=Shabu-shabu+Sukiyaki+Shabu+Zen+Fukuoka+Showa-dori+Daimyo+Branch'
      },
      {
        name:'Yakiniku Champion (JR Hakata City Store)',
        city:'Fukuoka',
        category:'Yakiniku (A5 wagyu)',
        emoji:'🥩',
        photo:'assets/fukuoka-pins/yakiniku-champion.jpg',
        mapUrl:'https://www.google.com/maps/search/?api=1&query=Yakiniku+Champion+JR+Hakata+City+Store'
      },
      {
        name:'Nikuya Nikuichi (Hakata Branch)',
        city:'Fukuoka',
        category:'Yakiniku',
        emoji:'🥩',
        photo:'assets/fukuoka-pins/nikuichi.jpg',
        mapUrl:'https://www.google.com/maps/search/?api=1&query=%E3%81%AB%E3%81%8F%E5%B1%8B+%E8%82%89%E3%81%84%E3%81%A1+%E5%8D%9A%E5%A4%9A%E5%BA%97'
      },
      {
        name:'Karatomari Ebisu Oyster Hut',
        city:'Fukuoka',
        category:'Seafood grill / oyster hut',
        emoji:'🦪',
        photo:'assets/fukuoka-pins/karatomari-ebisu.jpg',
        mapUrl:'https://www.google.com/maps/search/?api=1&query=Karatomari+Ebisu+Oyster+Hut'
      }
    ];

    const bounds = [];

    staticPoints.forEach(pt => {
      const marker = L.marker([pt.lat, pt.lng], { icon: icon(pt.emoji || '📍') }).addTo(map);
      marker.bindPopup(`<div style="min-width:220px"><b>${pt.name}</b><br/><span style="opacity:.8">${pt.city}</span><br/><div style="font-size:.82rem;opacity:.9">${pt.summary || ''}</div></div>`);
      bounds.push([pt.lat, pt.lng]);
    });

    fetch('travel-food-spots.json', {cache:'no-store'})
      .then(r=>r.json())
      .then(data => {
        const spots = (data.spots||[]).filter(s => {
          const city = (s.city||'').toLowerCase();
          const other = Array.isArray(s.other_city_options) ? s.other_city_options.join(' ').toLowerCase() : '';
          return city.includes('fukuoka') || city.includes('kokura') || city.includes('shimonoseki') || other.includes('fukuoka');
        });

        const chainPhotoMap = new Map();
        spots.forEach(s => {
          const key = (s.chain_group || '').toLowerCase().trim();
          const p = s.photo || (Array.isArray(s.photos) && s.photos.length ? s.photos[0] : '');
          if (key && p && !chainPhotoMap.has(key)) chainPhotoMap.set(key, p);
        });

        spots.forEach((s,idx) => {
          const city = (s.city||'').toLowerCase();
          const base = city.includes('kokura') ? centers.kokura : city.includes('shimonoseki') ? centers.shimonoseki : centers.fukuoka;
          const lat = typeof s.lat === 'number' ? s.lat : base[0] + ((idx%5)-2)*0.01;
          const lng = typeof s.lng === 'number' ? s.lng : base[1] + ((Math.floor(idx/5)%5)-2)*0.01;
          const em = (s.type||'').toLowerCase().includes('bbq') || (s.type||'').toLowerCase().includes('yakiniku') ? '🥩' : '🍽️';
          const m = L.marker([lat,lng], {icon: icon(em, !!s.chain)}).addTo(map);
          const hasFukuokaAlt = Array.isArray(s.other_city_options) && s.other_city_options.join(' ').toLowerCase().includes('fukuoka');
          const cityLower = (s.city || '').toLowerCase();
          const derivedMapUrl = (cityLower.includes('fukuoka') || cityLower.includes('kokura') || cityLower.includes('shimonoseki'))
            ? (s.map_url || '')
            : (hasFukuokaAlt ? `https://maps.google.com/?q=${encodeURIComponent((s.chain_group || s.name || 'restaurant') + ' Fukuoka')}` : (s.map_url || ''));
          const primaryPhoto = s.photo || (Array.isArray(s.photos) && s.photos.length ? s.photos[0] : '') || chainPhotoMap.get((s.chain_group || '').toLowerCase().trim()) || '';
          m.bindPopup(`<div style="min-width:240px;max-width:260px">${primaryPhoto ? `<img src="${primaryPhoto}" alt="${s.name||'Spot'}" style="width:100%;height:132px;object-fit:cover;border-radius:8px;margin-bottom:8px;border:1px solid rgba(0,0,0,.08)"/>` : ''}<b>${s.name||'Spot'}</b><br/><span style="opacity:.8">${s.city||''}</span><br/>${s.chain?'<span style="font-size:.78rem">🟡 chain option</span><br/>':''}${s.other_city_options?`<div style="font-size:.78rem;opacity:.9">Also in: ${s.other_city_options.join(' · ')}</div>`:''}${derivedMapUrl?`<a href="${derivedMapUrl}" target="_blank" rel="noopener">Open map ↗</a>`:''}</div>`);
          bounds.push([lat,lng]);
        });

        // Inject shortlist pins from trips/fukuoka-shortlist.md (avoid name duplicates)
        const existingNames = new Set(spots.map(s => (s.name || '').toLowerCase()));
        const addedShortlist = fukuokaShortlist.filter(p => !existingNames.has((p.name || '').toLowerCase()));

        addedShortlist.forEach((p, idx) => {
          const base = centers.fukuoka;
          const lat = base[0] + (((idx % 4) - 1.5) * 0.012);
          const lng = base[1] + (((Math.floor(idx / 4) % 4) - 1.5) * 0.012);
          const m = L.marker([lat, lng], { icon: icon(p.emoji || '📌') }).addTo(map);
          m.bindPopup(`<div style="min-width:240px;max-width:260px">${p.photo ? `<img src="${p.photo}" alt="${p.name}" style="width:100%;height:132px;object-fit:cover;border-radius:8px;margin-bottom:8px;border:1px solid rgba(0,0,0,.08)"/>` : ''}<b>${p.name}</b><br/><span style="opacity:.8">${p.city} · shortlist</span><br/><div style="font-size:.78rem;opacity:.9;margin:4px 0 6px">${p.category || ''}</div>${p.mapUrl ? `<a href="${p.mapUrl}" target="_blank" rel="noopener">Open map ↗</a>` : ''}</div>`);
          bounds.push([lat, lng]);
        });

        if (!spots.length && !addedShortlist.length) {
          L.marker(centers.fukuoka,{icon:icon('📍')}).addTo(map).bindPopup('No Fukuoka candidates yet.');
          return;
        }
        map.fitBounds(bounds, {padding:[30,30]});
      });
  </script>
</body>
</html>
