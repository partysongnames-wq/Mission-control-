<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fukuoka Area Plan · Mission Control</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{--bg:#030308;--panel:#101223;--muted:#a0a8c5;--border:rgba(255,255,255,.14);font-family:'Space Grotesk','Inter',system-ui;}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#233a5f,#030308 45%);color:#f5f7ff;display:flex;justify-content:center;padding:20px}
    .page{width:min(1180px,calc(100vw - 24px));background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:18px}
    .head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .chip{display:inline-flex;padding:7px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.2);color:#fff;text-decoration:none;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase}
    #map{height:460px;border-radius:14px;border:1px solid rgba(255,255,255,.15)}
    .note{margin-top:10px;color:var(--muted);font-size:.86rem}

    .map-wrap{position:relative}
    .map-controls{position:absolute;top:12px;right:12px;z-index:1000;display:flex;gap:8px;align-items:center;flex-wrap:wrap;max-width:85%;justify-content:flex-end}
    .map-control-btn,.map-control-link{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:999px;padding:8px 12px;border:1px solid rgba(255,255,255,.18);background:rgba(3,3,8,.72);color:#fff;text-decoration:none;font-size:.72rem;letter-spacing:.08em;backdrop-filter:blur(4px)}
    .map-control-btn{cursor:pointer;font-family:inherit}
    .map-control-btn:hover,.map-control-link:hover{background:rgba(255,255,255,.16)}
    .map-control-link{display:none}

    .user-dot-wrap{position:relative;width:18px;height:18px;}
    .user-dot{position:absolute;left:50%;top:50%;width:12px;height:12px;transform:translate(-50%,-50%);background:#1a73e8;border:2px solid #fff;border-radius:999px;box-shadow:0 0 0 1px rgba(0,0,0,.25),0 2px 8px rgba(0,0,0,.35);}
    .user-dot-pulse{position:absolute;left:50%;top:50%;width:24px;height:24px;transform:translate(-50%,-50%);border-radius:999px;background:rgba(26,115,232,.28);opacity:0;}
    .user-dot-wrap.live .user-dot-pulse{animation:userPulse 1.8s ease-out infinite;opacity:1;}
    @keyframes userPulse{0%{transform:translate(-50%,-50%) scale(.45);opacity:.85;}100%{transform:translate(-50%,-50%) scale(1.25);opacity:0;}}

    body.map-lock{overflow:hidden}
    .map-wrap.map-fullscreen{position:fixed;inset:0;z-index:9999;border-radius:0;margin:0;border:none;padding:calc(10px + env(safe-area-inset-top)) 10px calc(12px + env(safe-area-inset-bottom));background:rgba(3,3,8,.98);display:flex;flex-direction:column}
    .map-wrap.map-fullscreen #map{height:calc(100dvh - 120px);height:calc(100vh - 120px);border-radius:14px;flex:1 1 auto;min-height:280px;touch-action:pan-x pan-y}
    .map-wrap.map-fullscreen .map-control-link{display:inline-flex}

    @media (max-width: 820px){
      body{padding:10px}
      .page{width:min(1180px,calc(100vw - 12px));padding:12px;border-radius:18px}
      #map{height:78vh;min-height:520px;border-radius:12px}
      .map-controls{top:10px;right:10px;gap:6px}
      .map-control-btn,.map-control-link{font-size:.68rem;padding:7px 10px}
      .map-wrap.map-fullscreen #map{height:calc(100dvh - 140px);height:calc(100vh - 140px)}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="head">
      <div>
        <h2 style="margin:0;letter-spacing:.18em;text-transform:uppercase;">Fukuoka Area (2-night block)</h2>
        <div style="color:var(--muted);margin-top:6px;">Includes Fukuoka + nearby stopovers (Kokura/Shimonoseki) and chain options worth moving from Osaka.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;">
        <a class="chip" href="mission-control.html">⟵ Mission</a>
        <a class="chip" href="mission-control-food.html">🍜 Food</a>
        <a class="chip" href="mission-control-osaka-plan.html">📅 Osaka</a>
        <a class="chip" href="mission-control-trip-map.html">🌐 Master Map</a>
      </div>
    </div>
    <section class="map-wrap" id="map-wrap">
      <div class="map-controls">
        <button class="map-control-btn" id="map-locate-btn" type="button" aria-label="Show my location">📍 Locate once</button>
        <button class="map-control-btn" id="map-live-btn" type="button" aria-label="Start live tracking" aria-pressed="false">🟢 Start live</button>
        <button class="map-control-btn" id="map-fullscreen-toggle" type="button" aria-label="Expand map" aria-expanded="false">⛶ Expand map</button>
        <a class="map-control-link" id="map-google-link" href="https://www.google.com/maps" target="_blank" rel="noopener">↗ Google Maps</a>
      </div>
      <div id="map"></div>
    </section>
    <div class="note">🟡 Yellow dot = chain candidate you could do here instead of Osaka.</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const map = L.map('map').setView([33.5902,130.4017], 10);
    const mapWrap = document.getElementById('map-wrap');
    const mapToggle = document.getElementById('map-fullscreen-toggle');
    const mapLocateBtn = document.getElementById('map-locate-btn');
    const mapLiveBtn = document.getElementById('map-live-btn');
    const mapGoogleLink = document.getElementById('map-google-link');
    let mapScrollY = 0;
    let userMarker = null;
    let userAccuracyCircle = null;
    let liveWatchId = null;
    let liveAutoStopTimer = null;

    const updateGoogleMapLink = () => {
      const c = map.getCenter();
      const z = map.getZoom();
      mapGoogleLink.href = `https://www.google.com/maps/@${c.lat},${c.lng},${Math.max(z, 12)}z`;
    };

    const setMapFullscreen = (isFullscreen) => {
      if (isFullscreen) {
        mapScrollY = window.scrollY;
        mapWrap.classList.add('map-fullscreen');
        document.body.classList.add('map-lock');
        mapToggle.textContent = '✕ Close map';
        mapToggle.setAttribute('aria-label', 'Close full-screen map');
        mapToggle.setAttribute('aria-expanded', 'true');
      } else {
        mapWrap.classList.remove('map-fullscreen');
        document.body.classList.remove('map-lock');
        mapToggle.textContent = '⛶ Expand map';
        mapToggle.setAttribute('aria-label', 'Expand map');
        mapToggle.setAttribute('aria-expanded', 'false');
        window.scrollTo({ top: mapScrollY, behavior: 'auto' });
      }
      updateGoogleMapLink();
      setTimeout(() => map.invalidateSize(), 60);
    };

    const userLocationIcon = (isLive = false) => L.divIcon({
      className: 'user-location-icon',
      html: `<div class="user-dot-wrap ${isLive ? 'live' : ''}"><span class="user-dot-pulse"></span><span class="user-dot"></span></div>`,
      iconSize: [24,24],
      iconAnchor: [12,12]
    });

    const paintUserLocation = (pos, shouldCenter = true, isLive = false) => {
      const latlng = [pos.coords.latitude, pos.coords.longitude];
      const accuracy = Math.max(12, Math.round(pos.coords.accuracy || 20));
      if (userMarker) map.removeLayer(userMarker);
      if (userAccuracyCircle) map.removeLayer(userAccuracyCircle);
      userMarker = L.marker(latlng, { icon: userLocationIcon(isLive) }).addTo(map)
        .bindPopup(`You are here<br/>Accuracy: ±${accuracy}m`);
      userAccuracyCircle = L.circle(latlng, {
        radius: accuracy,
        color: '#4da3ff',
        fillColor: '#4da3ff',
        fillOpacity: 0.12,
        weight: 1
      }).addTo(map);
      if (shouldCenter) map.setView(latlng, Math.max(map.getZoom(), 15), { animate: true });
    };

    const stopLiveTracking = (msg = '🟢 Start live') => {
      if (liveWatchId !== null) {
        navigator.geolocation.clearWatch(liveWatchId);
        liveWatchId = null;
      }
      if (liveAutoStopTimer) {
        clearTimeout(liveAutoStopTimer);
        liveAutoStopTimer = null;
      }
      if (userMarker) userMarker.setIcon(userLocationIcon(false));
      mapLiveBtn.textContent = msg;
      mapLiveBtn.setAttribute('aria-pressed', 'false');
    };

    mapToggle.addEventListener('click', () => setMapFullscreen(!mapWrap.classList.contains('map-fullscreen')));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && mapWrap.classList.contains('map-fullscreen')) setMapFullscreen(false);
    });

    mapLocateBtn?.addEventListener('click', () => {
      if (!navigator.geolocation) {
        mapLocateBtn.textContent = '⚠️ No GPS support';
        setTimeout(() => (mapLocateBtn.textContent = '📍 Locate once'), 1800);
        return;
      }
      mapLocateBtn.textContent = '⏳ Locating...';
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          paintUserLocation(pos, true, false);
          mapLocateBtn.textContent = '✅ Located';
          setTimeout(() => (mapLocateBtn.textContent = '📍 Locate once'), 1400);
        },
        () => {
          mapLocateBtn.textContent = '❌ Location denied';
          setTimeout(() => (mapLocateBtn.textContent = '📍 Locate once'), 1800);
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 }
      );
    });

    mapLiveBtn?.addEventListener('click', () => {
      if (!navigator.geolocation) {
        mapLiveBtn.textContent = '⚠️ No GPS support';
        setTimeout(() => (mapLiveBtn.textContent = '🟢 Start live'), 1800);
        return;
      }
      if (liveWatchId !== null) {
        stopLiveTracking('🟢 Start live');
        return;
      }
      mapLiveBtn.textContent = '⏹ Stop live';
      mapLiveBtn.setAttribute('aria-pressed', 'true');
      liveWatchId = navigator.geolocation.watchPosition(
        (pos) => paintUserLocation(pos, true, true),
        () => {
          stopLiveTracking('❌ Live blocked');
          setTimeout(() => (mapLiveBtn.textContent = '🟢 Start live'), 1800);
        },
        { enableHighAccuracy: false, timeout: 15000, maximumAge: 15000 }
      );
      liveAutoStopTimer = setTimeout(() => stopLiveTracking('⏲ Live ended'), 30 * 60 * 1000);
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 19, subdomains: 'abcd', attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);
    map.on('moveend zoomend', updateGoogleMapLink);
    updateGoogleMapLink();

    const icon = (emoji, chain=false) => L.divIcon({
      className:'',
      html:`<div style="font-size:20px;position:relative;">${emoji}${chain?'<span style="position:absolute;right:-5px;top:-4px;width:8px;height:8px;background:#ffd84d;border:1px solid #222;border-radius:999px"></span>':''}</div>`,
      iconSize:[24,24],iconAnchor:[12,12]
    });

    const centers = {
      'fukuoka': [33.5902,130.4017],
      'kokura': [33.8833,130.8751],
      'shimonoseki': [33.9578,130.9415]
    };

    const staticPoints = [
      {
        name:'Hotel Livemax Kokura Ekimae (your stay base)',
        city:'Kokura',
        emoji:'🏨',
        lat:33.8844,
        lng:130.8829,
        summary:'Confirmed from your booking screenshot: 2-night base in Kokura before Hiroshima.'
      },
      {
        name:'Hakata Station (Shinkansen)',
        city:'Fukuoka',
        emoji:'🚄',
        lat:33.5898,
        lng:130.4207,
        summary:'Main Kyushu Shinkansen / Sanyo Shinkansen hub.'
      },
      {
        name:'Kokura Station (Shinkansen)',
        city:'Kokura',
        emoji:'🚄',
        lat:33.8869,
        lng:130.8826,
        summary:'Major rail hub for Kitakyushu / transfer point.'
      },
      {
        name:'Shin-Shimonoseki Station (Shinkansen)',
        city:'Shimonoseki',
        emoji:'🚄',
        lat:34.0031,
        lng:130.9504,
        summary:'Nearest Shinkansen stop on Shimonoseki side.'
      }
    ];

    // Added from trips/fukuoka-shortlist.md (Yoko shortlist)
    const fukuokaShortlist = [
      {
        name:'Sushi Sakaba Sashisu Honten (Hakata Ming)',
        city:'Fukuoka',
        category:'Sushi izakaya',
        emoji:'🍣',
        lat:33.5906798,
        lng:130.4206962,
        mapUrl:'https://www.google.com/maps/search/?api=1&query=%E3%81%99%E3%81%97%E9%85%92%E5%A0%B4+%E3%81%95%E3%81%97%E3%81%99+%E5%8D%9A%E5%A4%9A%E3%83%9E%E3%82%A4%E3%83%B3%E3%82%B0%E5%BA%97'
      },
      {
        name:'I\'m donut ? Fukuoka',
        city:'Fukuoka',
        category:'Donut shop',
        emoji:'🍩',
        lat:33.5884829,
        lng:130.4023833,
        mapUrl:'https://www.google.com/maps/search/?api=1&query=I%27m+donut%3F+%E7%A6%8F%E5%B2%A1%E5%BA%97'
      },
      {
        name:'Musashiza (すみ劇場 むさし坐)',
        city:'Fukuoka',
        category:'Izakaya / grilled seafood-meat',
        emoji:'🍽️',
        lat:33.5877896,
        lng:130.403946,
        mapUrl:'https://www.google.com/maps/search/?api=1&query=%E3%81%99%E3%81%BF%E5%8A%87%E5%A0%B4+%E3%82%80%E3%81%95%E3%81%97%E5%9D%90+%E7%A6%8F%E5%B2%A1'
      },
      {
        name:'Shabu Zen Fukuoka Showa-dori Daimyo Branch',
        city:'Fukuoka',
        category:'Shabu-shabu / sukiyaki',
        emoji:'🍲',
        lat:33.5908973,
        lng:130.3949885,
        mapUrl:'https://www.google.com/maps/search/?api=1&query=Shabu-shabu+Sukiyaki+Shabu+Zen+Fukuoka+Showa-dori+Daimyo+Branch'
      },
      {
        name:'Yakiniku Champion (JR Hakata City Store)',
        city:'Fukuoka',
        category:'Yakiniku (A5 wagyu)',
        emoji:'🥩',
        lat:33.5898533,
        lng:130.4200085,
        mapUrl:'https://www.google.com/maps/search/?api=1&query=Yakiniku+Champion+JR+Hakata+City+Store'
      },
      {
        name:'Nikuya Nikuichi (Hakata Branch)',
        city:'Fukuoka',
        category:'Yakiniku',
        emoji:'🥩',
        photo:'assets/fukuoka-pins/nikuichi.jpg',
        lat:33.5862991,
        lng:130.4218915,
        mapUrl:'https://www.google.com/maps/search/?api=1&query=%E3%81%AB%E3%81%8F%E5%B1%8B+%E8%82%89%E3%81%84%E3%81%A1+%E5%8D%9A%E5%A4%9A%E5%BA%97'
      },
      {
        name:'Karatomari Ebisu Oyster Hut',
        city:'Fukuoka',
        category:'Seafood grill / oyster hut',
        emoji:'🦪',
        photo:'assets/fukuoka-pins/karatomari-ebisu.jpg',
        lat:33.6275222,
        lng:130.2282014,
        mapUrl:'https://www.google.com/maps/search/?api=1&query=Karatomari+Ebisu+Oyster+Hut'
      }
    ];

    const bounds = [];

    staticPoints.forEach(pt => {
      const marker = L.marker([pt.lat, pt.lng], { icon: icon(pt.emoji || '📍') }).addTo(map);
      marker.bindPopup(`<div style="min-width:220px"><b>${pt.name}</b><br/><span style="opacity:.8">${pt.city}</span><br/><div style="font-size:.82rem;opacity:.9">${pt.summary || ''}</div></div>`);
      bounds.push([pt.lat, pt.lng]);
    });

    fetch('travel-food-spots.json', {cache:'no-store'})
      .then(r=>r.json())
      .then(data => {
        const spots = (data.spots||[]).filter(s => {
          const city = (s.city||'').toLowerCase();
          const other = Array.isArray(s.other_city_options) ? s.other_city_options.join(' ').toLowerCase() : '';
          return city.includes('fukuoka') || city.includes('kokura') || city.includes('shimonoseki') || other.includes('fukuoka');
        });

        const chainPhotoMap = new Map();
        spots.forEach(s => {
          const key = (s.chain_group || '').toLowerCase().trim();
          const p = s.photo || (Array.isArray(s.photos) && s.photos.length ? s.photos[0] : '');
          if (key && p && !chainPhotoMap.has(key)) chainPhotoMap.set(key, p);
        });

        spots.forEach((s,idx) => {
          const city = (s.city||'').toLowerCase();
          const base = city.includes('kokura') ? centers.kokura : city.includes('shimonoseki') ? centers.shimonoseki : centers.fukuoka;
          const lat = typeof s.lat === 'number' ? s.lat : base[0] + ((idx%5)-2)*0.01;
          const lng = typeof s.lng === 'number' ? s.lng : base[1] + ((Math.floor(idx/5)%5)-2)*0.01;
          const em = (s.type||'').toLowerCase().includes('bbq') || (s.type||'').toLowerCase().includes('yakiniku') ? '🥩' : '🍽️';
          const m = L.marker([lat,lng], {icon: icon(em, !!s.chain)}).addTo(map);
          const hasFukuokaAlt = Array.isArray(s.other_city_options) && s.other_city_options.join(' ').toLowerCase().includes('fukuoka');
          const cityLower = (s.city || '').toLowerCase();
          const derivedMapUrl = (cityLower.includes('fukuoka') || cityLower.includes('kokura') || cityLower.includes('shimonoseki'))
            ? (s.map_url || '')
            : (hasFukuokaAlt ? `https://maps.google.com/?q=${encodeURIComponent((s.chain_group || s.name || 'restaurant') + ' Fukuoka')}` : (s.map_url || ''));
          const primaryPhoto = s.photo || (Array.isArray(s.photos) && s.photos.length ? s.photos[0] : '') || chainPhotoMap.get((s.chain_group || '').toLowerCase().trim()) || '';
          m.bindPopup(`<div style="min-width:240px;max-width:260px">${primaryPhoto ? `<img src="${primaryPhoto}" alt="${s.name||'Spot'}" style="width:100%;height:132px;object-fit:cover;border-radius:8px;margin-bottom:8px;border:1px solid rgba(0,0,0,.08)"/>` : ''}<b>${s.name||'Spot'}</b><br/><span style="opacity:.8">${s.city||''}</span><br/>${s.chain?'<span style="font-size:.78rem">🟡 chain option</span><br/>':''}${s.other_city_options?`<div style="font-size:.78rem;opacity:.9">Also in: ${s.other_city_options.join(' · ')}</div>`:''}${derivedMapUrl?`<a href="${derivedMapUrl}" target="_blank" rel="noopener">Open map ↗</a>`:''}</div>`);
          bounds.push([lat,lng]);
        });

        // Inject shortlist pins from trips/fukuoka-shortlist.md (avoid name duplicates)
        const existingNames = new Set(spots.map(s => (s.name || '').toLowerCase()));
        const addedShortlist = fukuokaShortlist.filter(p => !existingNames.has((p.name || '').toLowerCase()));

        addedShortlist.forEach((p, idx) => {
          const base = centers.fukuoka;
          const lat = (typeof p.lat === 'number') ? p.lat : (base[0] + (((idx % 4) - 1.5) * 0.012));
          const lng = (typeof p.lng === 'number') ? p.lng : (base[1] + (((Math.floor(idx / 4) % 4) - 1.5) * 0.012));
          const m = L.marker([lat, lng], { icon: icon(p.emoji || '📌') }).addTo(map);
          m.bindPopup(`<div style="min-width:240px;max-width:260px">${p.photo ? `<img src="${p.photo}" alt="${p.name}" style="width:100%;height:132px;object-fit:cover;border-radius:8px;margin-bottom:8px;border:1px solid rgba(0,0,0,.08)"/>` : ''}<b>${p.name}</b><br/><span style="opacity:.8">${p.city} · shortlist</span><br/><div style="font-size:.78rem;opacity:.9;margin:4px 0 6px">${p.category || ''}</div>${p.mapUrl ? `<a href="${p.mapUrl}" target="_blank" rel="noopener">Open map ↗</a>` : ''}</div>`);
          bounds.push([lat, lng]);
        });

        if (!spots.length && !addedShortlist.length) {
          L.marker(centers.fukuoka,{icon:icon('📍')}).addTo(map).bindPopup('No Fukuoka candidates yet.');
          return;
        }
        map.fitBounds(bounds, {padding:[30,30]});
      });
  </script>
</body>
</html>
