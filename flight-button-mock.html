<!doctype html><html><head><meta charset='utf-8'><title>Flights prominence mock</title><style>
body{margin:0;background:#0a0c18;color:#fff;font-family:Inter,system-ui;padding:24px}
.wrap{max-width:1100px;margin:0 auto;display:grid;gap:20px}
.card{background:#14182b;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px}
.h{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#a0a8c5;margin-bottom:12px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.chip{padding:9px 13px;border-radius:999px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.04);font-size:12px;letter-spacing:.12em;text-transform:uppercase}
.primary{background:linear-gradient(135deg,#ffb347,#10a37f);color:#111;border:none;font-weight:700}
.badge{position:relative}
.badge::after{content:'2 PENDING';position:absolute;top:-8px;right:-8px;background:#ef4444;color:#fff;border-radius:999px;padding:2px 6px;font-size:9px;letter-spacing:.08em}
.hero{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}
.big{padding:18px;border-radius:14px;background:linear-gradient(135deg,#ffb347,#10a37f);color:#111;font-weight:700}
.small{padding:18px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
</style></head><body><div class='wrap'>
<div class='card'><div class='h'>Option A · Primary CTA</div><div class='row'><div class='chip primary'>✈ Flights</div><div class='chip'>🏨 Hotels</div><div class='chip'>🚆 Rail</div><div class='chip'>🗺 Briefs</div></div></div>
<div class='card'><div class='h'>Option B · Alert Badge</div><div class='row'><div class='chip badge'>✈ Flights</div><div class='chip'>🏨 Hotels</div><div class='chip'>🚆 Rail</div><div class='chip'>🗺 Briefs</div></div></div>
<div class='card'><div class='h'>Option C · Split Hero</div><div class='hero'><div class='big'>✈ Open Flights Dashboard</div><div class='small'>🏨 Hotels</div><div class='small'>🚆 Rail</div></div></div>
</div></body></html>
