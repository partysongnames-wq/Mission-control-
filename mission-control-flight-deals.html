<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Deals Radar · Mission Control</title>
  <style>
    :root{--bg:#030308;--panel:#101223;--card:#1d2135;--muted:#a0a8c5;--border:rgba(255,255,255,.12);--accent:#ffb347;--accent2:#10a37f;font-family:'Space Grotesk','Inter',system-ui;}
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#2d1b54,#030308 45%);color:#f5f7ff;display:flex;justify-content:center;padding:24px;}
    .page{width:min(1200px,calc(100vw-32px));background:var(--panel);border-radius:32px;padding:32px;border:1px solid var(--border);box-shadow:0 30px 80px rgba(0,0,0,.7);}    
    header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
    h1{margin:0;font-size:1.6rem;letter-spacing:.22em;text-transform:uppercase;}
    a{color:var(--accent);text-decoration:none;}
    .meta{color:var(--muted);letter-spacing:.08em;font-size:.85rem;}

    .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:12px 0 18px;}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);font-size:.8rem;letter-spacing:.1em;}
    .pill input{accent-color:var(--accent);}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
    .card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:22px;padding:18px;}
    .card.highlight{border-color:rgba(255,179,71,.7);box-shadow:0 0 20px rgba(255,179,71,.3);animation:pulse 2.2s ease-in-out infinite;}
    .card h3{margin:0;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}
    .card strong{display:block;margin-top:8px;font-size:1.2rem;letter-spacing:.12em;}
    .deal{margin-top:12px;padding:12px;border-radius:16px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);}
    .deal.highlight{border-color:rgba(16,163,127,.7);box-shadow:0 0 12px rgba(16,163,127,.35);}
    .save{display:inline-flex;align-items:center;margin-left:8px;padding:2px 8px;border-radius:999px;border:1px solid rgba(16,163,127,.5);background:rgba(16,163,127,.15);color:#d7fff3;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;}
    .deal-row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .deal small{color:var(--muted);letter-spacing:.08em;}
    button{border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;padding:8px 12px;cursor:pointer;letter-spacing:.12em;font-size:.75rem;}
    button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#050509;}
    .deal-alert{display:inline-flex;align-items:center;gap:4px;margin-left:8px;padding:4px 10px;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#050509;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;animation:pulse 2s ease-in-out infinite;}
    .empty{color:var(--muted);letter-spacing:.12em;text-align:center;padding:24px;border:1px dashed rgba(255,255,255,.15);border-radius:18px;}
  
    .glass-header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;
      padding:14px 14px;border-radius:22px;border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.04));
      box-shadow:0 20px 50px rgba(0,0,0,.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .glass-meta{color:var(--muted);letter-spacing:.10em;font-size:.78rem;text-transform:uppercase;opacity:.9;}
    .chipbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(12,14,24,.28);
      color:#fff;text-decoration:none;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
    }
    .chip:hover{transform:translateY(-1px);background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.26);}
    .chip.active{background:rgba(255,179,71,.14);border-color:rgba(255,179,71,.50);}
    .chip .ico{font-size:.95rem;letter-spacing:0;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.75;transform:scale(1.02);}}
</style>
</head>
<body>
  <div class="page">
    <header class="glass-header">
      <div>
        <h1>Deals Radar</h1>
        <div class="meta">Cheap alternatives outside the pinned plan · <a href="/mission-control-flight-plan.html">Back to flight plan</a></div>
      </div>
      <div class="meta" id="checked">Last checked: —</div>
    
      <div class="chipbar">
        <a class="chip" href="/mission-control.html"><span class="ico">⟵</span>Mission</a>
        <a class="chip" href="/mission-control-flight-plan.html"><span class="ico">✈</span>Flights</a>
        <a class="chip active" href="/mission-control-flight-deals.html"><span class="ico">🏷</span>Deals</a>
        <a class="chip" href="/mission-control-city-briefs.html"><span class="ico">🗺</span>Briefs</a>
        <a class="chip" href="/mission-control-flight-alternatives.html"><span class="ico">⎇</span>Alts</a>
        <a class="chip" href="/mission-control-food.html"><span class="ico">🍜</span>Food</a>
      </div>
</header>

    <div class="controls">
      <span class="pill"><input type="checkbox" id="avoid-vn" checked /> Avoid Vietnam transit (Trent)</span>
      <span class="pill"><input type="checkbox" id="direct-only" /> Direct only</span>
      <span class="pill"><input type="checkbox" id="flex-days" checked /> ±1 day where flexible</span>
      <button class="primary" id="scan">Scan now</button>
    </div>

    <div class="grid" id="grid"></div>
    <div id="empty" class="empty" style="display:none;">No deal snapshots yet. Hit <strong>Scan now</strong> to populate.</div>
  </div>

  <script>
    async function loadPlan(){
      const res = await fetch('travel-flight-plan.json');
      return await res.json();
    }

    function fmt(n){
      if (typeof n !== 'number' || !isFinite(n)) return '—';
      return 'THB ' + Math.round(n).toLocaleString();
    }

    function render(plan){
      const checked = document.getElementById('checked');
      if (checked) checked.textContent = `Last checked: ${plan.meta?.deals_last_checked || '—'}`;

      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const deals = plan.deals_radar || [];

      if (!deals.length){
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      grid.innerHTML = deals.map(section => {
        const items = (section.deals || []).map(d => {
          const link = d.url ? `<a href="${d.url}" target="_blank" style="color:var(--accent);text-decoration:none;">Open</a>` : '';
          const savings = typeof d.savings_vs_baseline === 'number' ? d.savings_vs_baseline : 0;
          const isBig = savings >= 300;
          return `
            <div class="deal${isBig ? ' highlight' : ''}">
              <div class="deal-row">
                <div><strong style="font-size:1rem;letter-spacing:.08em;">${d.route} · ${d.date}</strong> ${(() => { const s=savings; return s>0 ? `<span class="save">Save ${Math.round(s).toLocaleString()}</span>` : ''; })()}<br><small>${d.airline || 'TBD'} · ${d.times || 'TBD'} · ${d.stops || 'TBD'}</small></div>
                <div style="text-align:right"><strong style="font-size:1rem;letter-spacing:.08em;">${fmt(d.price_per_person)}</strong><br><small>${link}</small></div>
              </div>
              <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">
                <button onclick="promoteDeal(${JSON.stringify(d)})">Add to flight plan</button>
                <button onclick="navigator.clipboard.writeText('${(d.url||'')}')">Copy link</button>
              </div>
            </div>`;
        }).join('');
        const highlightSection = (section.deals || []).some(d => typeof d.savings_vs_baseline === 'number' && d.savings_vs_baseline >= 300);
        return `
          <div class="card${highlightSection ? ' highlight' : ''}">
            <h3>${section.title}${highlightSection ? '<span class="deal-alert">New deal</span>' : ''}</h3>
            <strong>${section.subtitle || ''}</strong>
            ${items}
          </div>`;
      }).join('');
    }

    async function promoteDeal(deal){
      try{
        const res = await fetch('/api/promote-deal', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({flight_id: deal.flight_id, deal})
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'failed');
        alert('Saved as alternative for ' + deal.route + '. Alternatives now: ' + data.count);
      } catch(e){
        alert('Failed to save alternative.');
      }
    }

async function scan(){
      const btn = document.getElementById('scan');
      btn.disabled = true; btn.textContent = 'Scanning…';
      try {
        const res = await fetch('/run/deals');
        const data = await res.json();
        alert(data.message || (data.success ? 'Done.' : 'Failed.'));
      } catch(e){
        alert('Failed to run scan.');
      } finally {
        btn.disabled = false; btn.textContent = 'Scan now';
        const plan = await loadPlan();
        render(plan);
      }
    }

    document.getElementById('scan').addEventListener('click', scan);
    loadPlan().then(render);
  </script>
</body>
</html>
