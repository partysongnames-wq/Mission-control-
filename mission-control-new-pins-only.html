<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control · New Pins Only</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    body{margin:0;background:#0b1220;color:#eaf2ff;font-family:Inter,system-ui,sans-serif}
    #map{height:100vh;width:100vw}
    .top{position:fixed;top:10px;left:10px;z-index:9999;background:rgba(8,12,20,.92);padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.18)}
    a{color:#7dd3fc}
  </style>
</head>
<body>
  <div class="top"><b>New Pins Only</b><br><small>Hard-isolated view</small></div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const pins = [
      {name:'840 Surawong Rd', coords:[13.73070,100.52270], note:'840 Surawong Rd, Si Phraya, Bang Rak, Bangkok 10500', maps:'https://www.google.com/maps/search/?api=1&query=840+Surawong+Rd%2C+Si+Phraya%2C+Bang+Rak%2C+Bangkok+10500'},
      {name:'Cheap Drinks (Si Phraya)', coords:[13.73120,100.52185], note:'453/17-18 Si Phraya Rd, Si Phraya, Bang Rak, Bangkok 10500', maps:'https://www.google.com/maps/search/?api=1&query=453%2F17-18+Si+Phraya+Rd+Si+Phraya+Bang+Rak+Bangkok+10500'},
      {name:'PGHH+566 (Soi Naradhiwas 1)', coords:[13.72605,100.53175], note:'PGHH+566, Soi Naradhiwas Rajanagarindra 1, Si Lom, Bang Rak, Bangkok 10500', maps:'https://www.google.com/maps/search/?api=1&query=PGHH%2B566%2C+Soi+Naradhiwas+Rajanagarindra+1%2C+Si+Lom%2C+Bang+Rak%2C+Bangkok+10500'}
    ];
    const map = L.map('map').setView([13.7307,100.5227], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'}).addTo(map);
    const icon = L.divIcon({className:'',iconSize:[36,36],iconAnchor:[18,18],html:'<div style="width:36px;height:36px;border-radius:999px;background:radial-gradient(circle,#ff2d55 0%,#9f1239 72%);border:2px solid #fff;box-shadow:0 0 0 8px rgba(255,45,85,.25)"></div>'});
    pins.forEach(p=>L.marker(p.coords,{icon}).addTo(map).bindPopup(`<b>${p.name}</b><br>${p.note}<br><a href="${p.maps}" target="_blank">Open in Google Maps ↗</a>`).bindTooltip(p.name,{permanent:true,direction:'top',offset:[0,-18]}));
    const b = L.latLngBounds(pins.map(p=>p.coords));
    map.fitBounds(b.pad(0.35));
  </script>
</body>
</html>
