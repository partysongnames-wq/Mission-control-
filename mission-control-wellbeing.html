<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Well‑Being Studio · Thai Corner</title>
  <style>
    :root{
      --bg:#02030a;
      --panel:#0b0f1e;
      --card:#141a32;
      --border:rgba(255,255,255,.10);
      --text:#f6f6f8;
      --muted:#a4abc4;
      --gold:#f59c00;
      --green:#10a37f;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto;
      color:var(--text);
      background:radial-gradient(circle at 18% 0%, #18204a 0%, #070818 40%, #02030a 100%);
      display:flex;
      justify-content:center;
      padding:18px;
    }
    .shell{
      width:min(1200px, calc(100vw - 24px));
      border-radius:34px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 40px 90px rgba(0,0,0,.65);
      background:linear-gradient(180deg,rgba(255,255,255,.03),transparent 35%), rgba(9,12,28,.96);
    }
    header{
      position:relative;
      height:190px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    header::before{
      content:''; position:absolute; inset:0;
      background-image:url('/assets/standard-crew-hero.jpg');
      background-size:cover; background-position:center;
      filter:saturate(1.05) contrast(1.05);
      opacity:.95;
    }
    header::after{
      content:''; position:absolute; inset:0;
      background:linear-gradient(180deg,rgba(2,3,10,.30),rgba(2,3,10,.94));
    }
    .hinner{position:relative; z-index:1; height:100%; padding:16px 18px; display:flex; flex-direction:column; justify-content:space-between; gap:10px;}
    .top{display:flex; justify-content:space-between; gap:12px; align-items:flex-start; flex-wrap:wrap;}
    .kicker{letter-spacing:.34em; text-transform:uppercase; font-weight:900; font-size:.7rem; color:rgba(255,255,255,.78);}    
    h1{margin:6px 0 0; letter-spacing:.24em; text-transform:uppercase; font-size:1.7rem;}
    p{margin:8px 0 0; color:rgba(255,255,255,.82); max-width:820px; line-height:1.35; letter-spacing:.06em; font-size:.92rem;}
    nav{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;}
    nav a{ text-decoration:none; color:rgba(255,255,255,.86); font-size:.7rem; letter-spacing:.22em; text-transform:uppercase; padding:7px 11px; border-radius:999px; border:1px solid rgba(255,255,255,.18); background:rgba(0,0,0,.20); backdrop-filter:blur(6px);}    

    main{padding:16px 18px 22px; display:grid; grid-template-columns: 1fr 1fr; gap:14px;}
    @media (max-width: 980px){ main{ grid-template-columns:1fr; } }

    .card{border-radius:24px; border:1px solid rgba(255,255,255,.08); background:rgba(14,18,40,.55); padding:14px;}
    .card h2{margin:0 0 10px; font-size:.8rem; letter-spacing:.26em; text-transform:uppercase; color:var(--muted);}    

    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .pill{display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; font-size:.7rem; font-weight:900; letter-spacing:.18em; text-transform:uppercase; border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.06);}    
    .btn{border:none; border-radius:14px; padding:10px 12px; cursor:pointer; font-weight:900; letter-spacing:.18em; text-transform:uppercase; font-size:.7rem; background:linear-gradient(135deg,#f59c00,#ffd27a); color:#0a0a11;}
    .btn.ghost{background:rgba(255,255,255,.10); color:var(--text); border:1px solid rgba(255,255,255,.14);}    

    .thaiWord{display:grid; grid-template-columns: 1fr; gap:8px;}
    .thaiScript{font-size:2rem; font-weight:900; letter-spacing:.04em;}
    .thaiRoman{font-size:1.05rem; color:rgba(255,255,255,.88);}
    .thaiMeta{color:var(--muted); line-height:1.35;}

    table{width:100%; border-collapse:collapse;}
    th,td{padding:10px 10px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left; vertical-align:top;}
    th{color:var(--muted); font-size:.7rem; letter-spacing:.22em; text-transform:uppercase;}
    td{font-size:.95rem;}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:.9rem;}
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="hinner">
        <div class="top">
          <div>
            <div class="kicker">The Standard · Well‑Being Studio</div>
            <h1>Thai Corner</h1>
            <p>Light, daily rituals. A calm place to keep your Thai words (tone marks included) and a tiny check‑in.</p>
          </div>
          <nav>
            <a href="/mission-control.html">Mission Control</a>
            <a href="/world-hybrid">Office World</a>
            <a href="/mission-control-roster.html">Crew</a>
          </nav>
        </div>
        <div class="row">
          <span class="pill" id="todayPill">Today · Loading…</span>
          <button class="btn ghost" id="refreshBtn">Refresh</button>
        </div>
      </div>
    </header>

    <main>
      <section class="card">
        <h2>Thai word of the day</h2>
        <div class="thaiWord">
          <div class="thaiScript" id="wScript">—</div>
          <div class="thaiRoman mono" id="wRoman">—</div>
          <div class="thaiMeta" id="wMeaning">—</div>
          <div class="thaiMeta" id="wExample">—</div>
        </div>
      </section>

      <section class="card">
        <h2>My Thai glossary</h2>
        <div class="row" style="margin-bottom:10px;">
          <input id="q" placeholder="Search…" style="flex:1; min-width:220px; padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.20); color:var(--text);" />
          <button class="btn" id="addBtn">Add word</button>
        </div>
        <div style="overflow:auto; max-height:42vh;">
          <table>
            <thead>
              <tr>
                <th>Thai</th>
                <th>Roman (tone)</th>
                <th>Meaning</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Add modal -->
  <div id="addModal" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,.55); backdrop-filter: blur(6px);">
    <div style="max-width:720px; margin:10vh auto; background:rgba(12,16,35,.96); border:1px solid rgba(255,255,255,.14); border-radius:22px; box-shadow:0 40px 90px rgba(0,0,0,.6); overflow:hidden;">
      <div style="padding:14px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,.10);">
        <div style="font-weight:900; letter-spacing:.18em; text-transform:uppercase; font-size:.82rem; color:rgba(255,255,255,.85);">Add Thai word</div>
        <button id="closeAdd" class="btn ghost">Close</button>
      </div>
      <div style="padding:14px 16px; display:grid; gap:10px;">
        <input id="inThai" placeholder="Thai script (e.g., สบายดี)" style="padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.20); color:var(--text);" />
        <input id="inRoman" placeholder="Tone-mark romanization (e.g., sà-baai-dee)" style="padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.20); color:var(--text);" />
        <input id="inMeaning" placeholder="Meaning" style="padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.20); color:var(--text);" />
        <input id="inExample" placeholder="Example sentence (optional)" style="padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.20); color:var(--text);" />
        <div class="row" style="justify-content:space-between;">
          <div id="addStatus" style="color:var(--muted);">—</div>
          <button id="saveAdd" class="btn">Save</button>
        </div>
      </div>
    </div>
  </div>

<script>
  let state = {thai: {words: [], wordOfDay: null}};

  function openAdd(){ document.getElementById('addModal').style.display='block'; }
  function closeAdd(){ document.getElementById('addModal').style.display='none'; }

  function render(){
    const w = (state.thai && state.thai.wordOfDay) ? state.thai.wordOfDay : null;
    document.getElementById('todayPill').textContent = `Today · ${new Date().toLocaleDateString()}`;

    document.getElementById('wScript').textContent = w?.thai || '—';
    document.getElementById('wRoman').textContent = w?.roman || '—';
    document.getElementById('wMeaning').textContent = w?.meaning ? `Meaning: ${w.meaning}` : '—';
    document.getElementById('wExample').textContent = w?.example ? `Example: ${w.example}` : '';

    const q = (document.getElementById('q').value || '').trim().toLowerCase();
    const rows = document.getElementById('rows');
    rows.innerHTML = '';

    const words = (state.thai?.words || []).slice().reverse();
    const filtered = q ? words.filter(x => `${x.thai} ${x.roman} ${x.meaning}`.toLowerCase().includes(q)) : words;

    if (!filtered.length){
      rows.innerHTML = `<tr><td colspan="3" style="color:var(--muted)">No words yet.</td></tr>`;
      return;
    }

    for (const w of filtered){
      rows.innerHTML += `<tr><td style="font-weight:900;">${w.thai || ''}</td><td class="mono">${w.roman || ''}</td><td>${w.meaning || ''}</td></tr>`;
    }
  }

  async function refresh(){
    const res = await fetch('/api/wellbeing/state');
    state = await res.json();
    render();
  }

  async function saveWord(){
    const thai = (document.getElementById('inThai').value || '').trim();
    const roman = (document.getElementById('inRoman').value || '').trim();
    const meaning = (document.getElementById('inMeaning').value || '').trim();
    const example = (document.getElementById('inExample').value || '').trim();
    if (!thai || !roman || !meaning){
      document.getElementById('addStatus').textContent = 'Thai + roman + meaning required.';
      return;
    }
    document.getElementById('addStatus').textContent = 'Saving…';
    await fetch('/api/wellbeing/thai/add', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({thai, roman, meaning, example})
    });
    document.getElementById('addStatus').textContent = 'Saved.';
    closeAdd();
    await refresh();
  }

  document.getElementById('refreshBtn').addEventListener('click', refresh);
  document.getElementById('q').addEventListener('input', render);
  document.getElementById('addBtn').addEventListener('click', openAdd);
  document.getElementById('closeAdd').addEventListener('click', closeAdd);
  document.getElementById('saveAdd').addEventListener('click', saveWord);
  document.getElementById('addModal').addEventListener('click', (e) => { if (e.target.id==='addModal') closeAdd(); });
  document.addEventListener('keydown', (e) => { if (e.key==='Escape') closeAdd(); });

  refresh();
</script>
</body>
</html>
