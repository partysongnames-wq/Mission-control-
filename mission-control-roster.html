<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Standard Team Roster</title>
  <style>
    :root {
      --bg:#04060f;
      --panel:#0c0d1f;
      --accent:#f2a847;
      --accent2:#d3f9ac;
      --muted:#9ba0c3;
      --border:rgba(255,255,255,.12);
      --card:#15162b;
      --text:#fdfcf8;
      --shadow:0 30px 80px rgba(0,0,0,.8);
      font-family:'Space Grotesk','Inter',system-ui;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      background:linear-gradient(135deg,#05040a,#0b0b1c 45%,#030307);
      color:var(--text);
      display:flex;
      justify-content:center;
      padding:24px;
    }
    .page{
      width:min(1240px,calc(100vw-32px));
      background:var(--panel);
      border-radius:32px;
      padding:32px;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      gap:20px;
    }
    .hero{
      position:relative;
      border-radius:26px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.15);
      min-height:220px;
    }
    .hero::before{
      content:'';
      position:absolute;
      inset:0;
      background-image:url('/assets/standard-crew-hero.jpg');
      background-size:cover;
      background-position:center;
      filter:contrast(1.1) saturate(1.1);
    }
    .hero::after{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(5,5,10,.1),rgba(3,3,3,.8));
    }
    .hero-content{
      position:relative;
      z-index:1;
      padding:32px;
      display:flex;
      flex-direction:column;
      gap:12px;
      height:100%;
      justify-content:flex-end;
    }
    .hero-pill{
      align-self:flex-start;
      padding:6px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.4);
      background:rgba(0,0,0,.4);
      font-size:.65rem;
      letter-spacing:.3em;
      text-transform:uppercase;
    }
    .hero-content h1{
      margin:0;
      font-size:2.4rem;
      letter-spacing:.3em;
      text-transform:uppercase;
    }
    .hero-content p{
      margin:0;
      max-width:520px;
      color:rgba(255,255,255,.85);
      letter-spacing:.08em;
    }
    .roster{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:18px;
    }
    .card{
      background:var(--card);
      border-radius:20px;
      padding:18px;
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      flex-direction:column;
      gap:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.45);
      position:relative;
    }
    .card .avatar{
      width:56px;
      height:56px;
      border-radius:18px;
      border:2px solid rgba(255,255,255,.4);
      background-size:cover;
      background-position:center;
    }
    .card strong{
      font-size:1.2rem;
      margin:0;
      letter-spacing:.2em;
      color:var(--text);
      opacity:1;
    }
    .card span.nickname{
      font-family:'Press Start 2P',monospace;
      font-size:.65rem;
      letter-spacing:.25em;
      color:var(--accent2);
      text-transform:uppercase;
    }
    .card p{
      margin:0;
      color:var(--muted);
      line-height:1.4;
      font-size:.9rem;
    }
    .status-pill{
      align-self:flex-start;
      padding:4px 10px;
      border-radius:999px;
      font-size:.7rem;
      letter-spacing:.3em;
      text-transform:uppercase;
      border:1px solid rgba(255,255,255,.3);
    }
    .status-pill.active{background:rgba(211,249,172,.2);color:var(--accent2);border-color:rgba(211,249,172,.7);}
    .status-pill.idle{background:rgba(255,179,71,.2);color:var(--accent);border-color:rgba(255,179,71,.5);}
    .model {font-size:.65rem;letter-spacing:.3em;color:rgba(255,255,255,.6);}
    .badge-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .badge{
      padding:4px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      font-size:.65rem;
      letter-spacing:.25em;
      text-transform:uppercase;
      color:var(--muted);
    }
    .actions{margin-top:auto;display:flex;gap:10px;flex-wrap:wrap;}
    .actions button{
      border:none;
      border-radius:12px;
      padding:10px 16px;
      font-size:.7rem;
      letter-spacing:.25em;
      text-transform:uppercase;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#040409;
      cursor:pointer;
    }
    .nav{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      font-size:.7rem;
      letter-spacing:.3em;
      text-transform:uppercase;
    }
    .nav a{
      color:var(--accent2);
      text-decoration:none;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.15);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="hero-content">
        <div class="hero-pill">Team Roster</div>
        <h1>The Standard Crew</h1>
        <p>Live roster across the lounge, token board, and travel deck. Pick a card to see what each member is running and trigger their focus.</p>
      </div>
    </div>
    <div class="nav">
      <a href="/mission-control.html">Mission Control</a>
      <a href="/mission-control-calendar.html">Calendar</a>
      <a href="/mission-control-team.html">Lounge</a>
      <a href="/world-hybrid">Office</a>
      <a href="/mission-control-flight-plan.html">Flight Plan</a>
    </div>
    <div class="roster" id="roster"></div>
  </div>
  <script>
    const AGENTS = [
      // Pinned / top-of-roster
      { id: 'director', name: 'Trent', nickname: 'TR', desc: 'Director / approves changes', avatar: '/assets/trent-avatar.jpg', model: 'CEO' },
      { id: '-5287663927', name: 'Yoko', nickname: 'Yoko', desc: 'Multi‑role agent (ops + watch desk + travel coordination). Models: gpt‑5.2 / gpt‑5.3 depending on group.', roles: ['Ops', 'Watch desk', 'Travel'], actions: ['watch','travel','manifesto'], avatar: '/assets/yoko.jpg', model: 'openai-codex/gpt-5.2', groups: ['Design & Y Skills','Yoko + TJ','Main Ops'] },
      { id: 'yoko-lite', name: 'Yuki', nickname: 'Yuki', desc: 'Yoko’s little sister (lite). Fast scans only. Model: gpt‑5.1‑mini (upgradeable).', roles: ['Lite scans'], actions: ['watch'], avatar: '/assets/yoko.jpg', model: 'gpt-5.1-codex-mini', groups: ['Design & Y Skills','Yoko + TJ'] },

      // Crew
      { id: '-5275095885', name: 'Trent Assistant', nickname: 'TJ', desc: 'Trent’s mysterious assistant — travel scans + quiet ops.', action: 'travel', avatar: '/assets/tj.jpg', model: 'gpt-5.2', groups: ['Yoko + TJ'] },
      { id: '-5158792881', name: 'Jasper Assistant', nickname: 'Jas', desc: 'Manifesto + calm top 3', action: 'manifesto', avatar: '/assets/jaz.jpg', model: 'openai-codex/gpt-5.2' },
      { id: '-5181843441', name: 'Holly', nickname: 'Holly', desc: 'Japan Holiday — Japan trip + memories', action: 'memory', avatar: '/assets/holly.jpg', model: 'openai-codex/gpt-5.3-codex' },
      { id: '-5254836070', name: 'Side Jobs – Joe', nickname: 'Joe', desc: 'Job hunt + follow-ups', avatar: '/assets/joe.jpg', model: 'openai-codex/gpt-5.3-codex' },
      { id: '-5271777981', name: 'Clawd', nickname: 'Clawd', desc: 'Original creator + designer — builds the dashboards, keeps the cron fleet humming, and turns instincts into clickable tools.', action: 'watch', avatar: '/assets/clawd.jpg', model: 'openai-codex/gpt-5.2' },
    ];

    const roster = document.getElementById('roster');

    async function fetchData() {
      const [tokenRes, statusRes] = await Promise.all([fetch('/token-usage'), fetch('/status')]);
      const tokenData = tokenRes.ok ? (await tokenRes.json()).sessions || [] : [];
      const statuses = statusRes.ok ? await statusRes.json() : {};
      return { tokenData, statuses };
    }

    function renderRoster(tokenData, statuses) {
      const cards = AGENTS.map((agent) => {
        const tokenRow = tokenData.find((row) => row.groupSuffix === agent.id);
        const model = agent.model || (tokenRow ? tokenRow.model : 'unknown');
        const percent = tokenRow ? Math.round(tokenRow.percent * 100) : 0;
        const headroom = tokenRow ? tokenRow.limit - tokenRow.used : 0;
        const primaryStatusKey = agent.action || (agent.actions ? agent.actions[0] : '') || '';
        const state = statuses[primaryStatusKey]?.state || 'idle';
        const detail = statuses[primaryStatusKey]?.detail || 'Standing by';
        const stateClass = state === 'running' ? 'active' : 'idle';

        const roleBadges = (agent.roles || []).map(r => `<span class="badge">${r}</span>`).join('');
        const groupBadges = (agent.groups || []).map(g => `<span class="badge">${g}</span>`).join('');
        const actionList = agent.actions || (agent.action ? [agent.action] : []);
        const actionButtons = actionList.length
          ? actionList.map(a => {
              const label = a === 'watch' ? 'Launch Watch' : (a === 'travel' ? 'Run Travel' : (a === 'manifesto' ? 'Run Manifesto' : `Run ${a}`));
              return `<button onclick=\"trigger('${a}')\">${label}</button>`;
            }).join('')
          : `<button disabled style=\"opacity:.5;cursor:default;\">Director</button>`;

        return `
          <article class="card">
            <div class="avatar" style="background-image:url('${agent.avatar}');"></div>
            <div class="badge-row">
              <span class="badge">${stateClass === 'active' ? 'Active' : 'Idle'}</span>
              <span class="badge">${agent.nickname}</span>
              ${roleBadges}
            </div>
            ${groupBadges ? `<div class="badge-row" style="opacity:.7;">${groupBadges}</div>` : ''}
            <strong>${agent.name}</strong>
            <p>${agent.desc}</p>
            <div class="model">Model: ${model.replace('openai-codex/','').replace('openai/','')}</div>
            <div class="badge-row">
              <span class="badge">${percent}% usage</span>
              <span class="badge">${headroom.toLocaleString()} remaining</span>
            </div>
            <div class="status-pill ${stateClass}">${state === 'running' ? 'In motion' : 'Standing by'}</div>
            <div class="actions">${actionButtons}</div>
          </article>
        `;
      }).join('');
      roster.innerHTML = cards;
    }

    async function trigger(action) {
      if (!action) return;
      try {
        const res = await fetch('/run/' + action);
        if (!res.ok) throw new Error('failed');
      } catch (error) {
        console.error(error);
      }
    }

    async function init() {
      try {
        const { tokenData, statuses } = await fetchData();
        renderRoster(tokenData, statuses);
      } catch (error) {
        roster.innerHTML = '<p style="padding:12px;color:var(--muted);">Unable to load roster—try reloading.</p>';
      }
    }

    init();
  </script>
</body>
</html>
