<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="45%" stop-color="#f59c00"/>
      <stop offset="100%" stop-color="#c57a00"/>
    </linearGradient>
    <radialGradient id="shade" cx="50%" cy="20%" r="90%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.0)"/>
      <stop offset="70%" stop-color="rgba(0,0,0,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="256" cy="256" r="220"/>
    </clipPath>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feColorMatrix in="b" type="matrix" values="1 0 0 0 0  0 0.65 0 0 0  0 0 0.2 0 0  0 0 0 0.7 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#050409"/>

  <!-- outer rings -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="rgba(245,156,0,0.65)" stroke-width="6" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>

  <!-- photo -->
  <g clip-path="url(#clip)">
    <image href="trent.jpg" x="36" y="36" width="440" height="440" preserveAspectRatio="xMidYMid slice" />
    <rect x="36" y="36" width="440" height="440" fill="url(#shade)"/>

    <!-- nameplate -->
    <rect x="78" y="360" width="356" height="78" rx="22" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.14)"/>
    <text x="256" y="408" text-anchor="middle" font-family="Space Grotesk, system-ui" font-size="34" font-weight="900" letter-spacing="8" fill="url(#gold)">TRENT</text>
    <text x="256" y="438" text-anchor="middle" font-family="Space Grotesk, system-ui" font-size="14" font-weight="800" letter-spacing="6" fill="rgba(255,255,255,0.72)">DIRECTOR · COMMAND</text>
  </g>

  <!-- director mark -->
  <path d="M412 112l10 26 26 10-26 10-10 26-10-26-26-10 26-10z" fill="rgba(245,156,0,0.75)"/>
</svg>
